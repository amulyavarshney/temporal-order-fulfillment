server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: order-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./.data/orderfulfill;AUTO_SERVER=TRUE;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    orderfulfillapp: INFO
    io.temporal: INFO
